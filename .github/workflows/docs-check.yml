name: Docs Check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docs, structure, and local links
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $requiredFiles = @(
            'AGENTS.md',
            'README.md',
            'LICENSE',
            'CODE_OF_CONDUCT.md',
            'SECURITY.md',
            'CHANGELOG.md',
            'CONTRIBUTING.md',
            '.agents/README.md',
            'agent/system.md',
            'agent/workflow.md',
            'agent/rules.md',
            'agent/questioning.md',
            'agent/output_contract.md',
            'templates/project_intake.md',
            'templates/hardware_intake.md',
            'templates/module_plan.md',
            'templates/module_debug_checklist.md',
            'templates/integration_report.md',
            'docs/github_settings_checklist.md',
            'docs/skill_pack_contract.md',
            'docs/release_policy.md',
            'docs/roadmap.md',
            'docs/discussions_seed_topics.md',
            'docs/how_to_ask.md',
            'examples/README.md',
            '.github/CODEOWNERS',
            '.github/release.yml',
            '.github/workflows/docs-check.yml'
          )

          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              throw "Missing required file: $file"
            }
          }

          $requiredSkillDirs = @(
            '.agents/skills/project-intake',
            '.agents/skills/uart-bringup',
            '.agents/skills/i2c-bringup',
            '.agents/skills/spi-bringup',
            '.agents/skills/module-debug-checklist'
          )

          foreach ($dir in $requiredSkillDirs) {
            if (-not (Test-Path (Join-Path $dir 'SKILL.md'))) {
              throw "Missing skill entry: $dir/SKILL.md"
            }
          }

          $requiredExampleDirs = @(
            'examples/stm32_uart_minimal',
            'examples/stm32_i2c_sensor',
            'examples/stm32_spi_memory',
            'examples/multi_module_integration',
            'examples/insufficient_info_case'
          )

          foreach ($dir in $requiredExampleDirs) {
            foreach ($name in @('input.md', 'expected_output.md', 'notes.md')) {
              if (-not (Test-Path (Join-Path $dir $name))) {
                throw "Missing example file: $dir/$name"
              }
            }
          }

          $requiredSectionMap = @{
            'AGENTS.md' = @('## 角色', '## 强制工作流', '## 硬规则', '## 输出结构', '## 禁止事项')
            'README.md' = @('## 先看这里', '## 项目是什么', '## 推荐使用流程', '## 仓库结构', '## 支持范围', '## 非目标范围')
            '.agents/README.md' = @('## 目录职责', '## skill 最低契约', '## 与其他目录的分工')
            'docs/skill_pack_contract.md' = @('## 1. 目录契约', '## 2. 命名契约', '## 3. 内容契约', '## 4. 行为契约')
            'examples/README.md' = @('## 如何使用', '## 示例索引', '## 选哪个示例')
          }

          foreach ($entry in $requiredSectionMap.GetEnumerator()) {
            $content = Get-Content -Raw -Encoding utf8 $entry.Key
            foreach ($section in $entry.Value) {
              if ($content -notmatch [regex]::Escape($section)) {
                throw "Missing required section '$section' in $($entry.Key)"
              }
            }
          }

          $requiredSkillSections = @(
            '## skill 名称',
            '## skill 描述',
            '## 触发场景',
            '## 不应触发的场景',
            '## 所需输入',
            '## 输出要求',
            '## 边界与风险',
            '## 验收方式'
          )

          $skillFiles = Get-ChildItem .agents/skills -Recurse -Filter SKILL.md
          foreach ($skill in $skillFiles) {
            $skillContent = Get-Content -Raw -Encoding utf8 $skill.FullName
            foreach ($section in $requiredSkillSections) {
              if ($skillContent -notmatch [regex]::Escape($section)) {
                throw "Missing required section '$section' in $($skill.FullName)"
              }
            }
          }

          $mdFiles = Get-ChildItem -Recurse -Filter *.md | Where-Object { $_.FullName -notmatch '[\\/]\.git[\\/]' }
          foreach ($file in $mdFiles) {
            $content = Get-Content -Raw -Encoding utf8 $file.FullName
            if ([string]::IsNullOrWhiteSpace($content)) {
              throw "Empty markdown file: $($file.FullName)"
            }

            $lines = $content -split "`r?`n"
            $firstNonEmpty = $lines | Where-Object { $_.Trim() -ne '' } | Select-Object -First 1
            if (-not $firstNonEmpty.StartsWith('#')) {
              throw "Markdown file should start with a heading: $($file.FullName)"
            }

            $matches = [regex]::Matches($content, '\[[^\]]+\]\((?<target>[^)]+)\)')
            foreach ($match in $matches) {
              $target = $match.Groups['target'].Value.Trim()
              if (-not $target) { continue }
              if ($target.StartsWith('http://') -or $target.StartsWith('https://') -or $target.StartsWith('mailto:') -or $target.StartsWith('#')) {
                continue
              }

              if ($target.StartsWith('<') -and $target.EndsWith('>')) {
                $target = $target.Substring(1, $target.Length - 2)
              }

              $pathOnly = $target.Split('#')[0]
              if (-not $pathOnly) { continue }

              if ($pathOnly.StartsWith('/')) {
                $resolved = Join-Path $PWD $pathOnly.TrimStart('/','\')
              } else {
                $resolved = Join-Path $file.DirectoryName $pathOnly
              }

              if (-not (Test-Path $resolved)) {
                throw "Broken local link in $($file.FullName): $target"
              }
            }
          }

          Write-Host 'Docs check passed.'
