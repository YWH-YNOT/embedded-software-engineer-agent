name: Feature Request
description: 提议新增规则、模板、示例或仓库协作能力
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: 当前缺口
      description: 先说明当前仓库缺了什么，为什么现有内容不够
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 请描述你建议新增或修改的内容
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: 影响的工作流
      description: 说明它会影响哪个阶段，如何保持“阶段控制、验证闭环、官方优先”
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 适用范围与非目标
      description: 说明该功能适用于什么场景，不适用于什么场景
  - type: textarea
    id: examples
    attributes:
      label: 示例
      description: 如果可能，请给出一个实际工程场景
