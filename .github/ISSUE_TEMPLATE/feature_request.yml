name: Feature Request
description: 提议新增或增强规则、模板、示例、skill、协作流程
title: "[Feature] "
labels:
  - enhancement
body:
  - type: input
    id: platform
    attributes:
      label: 芯片 / 平台
      description: 如果需求与特定平台相关，请写准确型号；否则填通用
      placeholder: 例如 STM32F4 / 通用
    validations:
      required: true
  - type: dropdown
    id: toolchain
    attributes:
      label: 相关工具链
      options:
        - GCC
        - CMake + GCC
        - Keil
        - IAR
        - PlatformIO
        - ESP-IDF
        - 通用
        - 其他
    validations:
      required: true
  - type: dropdown
    id: current_phase
    attributes:
      label: 主要影响的工作阶段
      options:
        - Phase 0 资料审查
        - Phase 1 关键追问
        - Phase 2 模块拆解
        - Phase 3 单模块开发
        - Phase 4 单模块验证
        - Phase 5 系统集成
        - Phase 6 回归测试与收尾
        - 仓库协作基础设施
    validations:
      required: true
  - type: checkboxes
    id: docs_available
    attributes:
      label: 与该需求相关的资料前提
      options:
        - label: 有原理图
        - label: 有官方手册
        - label: 有官方 SDK / HAL / BSP
        - label: 有现有代码基线
        - label: 有真实硬件可验证
  - type: textarea
    id: problem
    attributes:
      label: 当前缺口
      description: 说明现有仓库哪里不够，为什么不能只靠现有内容解决
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 请写你建议新增或修改什么
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: 适用范围与非目标
      description: 请说明什么场景适用，什么场景不适用
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: 验收方式
      description: 怎么判断这个功能真的有价值、没破坏现有规则
    validations:
      required: true
