name: Prompt Regression
description: 报告 AGENTS / agent 规则、skill 或示例导致的行为回归
title: "[Regression] "
labels:
  - regression
body:
  - type: input
    id: platform
    attributes:
      label: 芯片 / 平台
      placeholder: 例如 STM32F407VET6
    validations:
      required: true
  - type: dropdown
    id: toolchain
    attributes:
      label: 工具链
      options:
        - GCC
        - CMake + GCC
        - Keil
        - IAR
        - STM32CubeIDE
        - PlatformIO
        - ESP-IDF
        - 其他
    validations:
      required: true
  - type: dropdown
    id: runner
    attributes:
      label: 运行环境
      options:
        - Codex
        - ChatGPT
        - Claude
        - 其他兼容运行器
    validations:
      required: true
  - type: dropdown
    id: current_phase
    attributes:
      label: 当前工作阶段
      options:
        - Phase 0 资料审查
        - Phase 1 关键追问
        - Phase 2 模块拆解
        - Phase 3 单模块开发
        - Phase 4 单模块验证
        - Phase 5 系统集成
        - Phase 6 回归测试与收尾
    validations:
      required: true
  - type: checkboxes
    id: docs_available
    attributes:
      label: 当前已具备的资料
      options:
        - label: 有原理图
        - label: 有引脚分配表
        - label: 有官方参考手册 / 数据手册
        - label: 有官方 SDK / HAL / BSP
        - label: 有现有代码基线
  - type: textarea
    id: prompt_source
    attributes:
      label: 使用的入口或文件
      description: 例如 AGENTS.md、agent/system.md、某个 skill
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: 预期行为
      description: 之前或按规则应该如何表现
    validations:
      required: true
  - type: textarea
    id: actual_behavior
    attributes:
      label: 实际行为
      description: 回归后具体哪里变了
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 尽量提供最小输入和最小输出对比
    validations:
      required: true
  - type: textarea
    id: attachments
    attributes:
      label: 附件 / 日志 / 链接
      description: 可贴对话片段、截图、提交范围、示例链接
